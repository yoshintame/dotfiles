# resticprofile config: Strategy 2 — backup to local repo, then restic copy to B2.
# See modules/resticprofile/backup-plan.md for full architecture.

version: "2"

global:
  default-command: snapshots
  scheduler: crond

groups:
  all:
    profiles:
      - dev
      - home
  full-cycle:
    profiles:
      - dev
      - home
      - copy-to-b2
  maintenance:
    profiles:
      - maint-local
      - maint-b2
  check:
    profiles:
      - check-local
      - check-b2

profiles:
  default:
    inherit: local

  base:
    initialize: true
    password-file: "{{ .Env.HOME }}/.config/resticprofile/repo.key"
    backup:
      exclude:
        - "**/node_modules"
        - "**/.venv"
        - "**/.DS_Store"
        - "**/Backups/restic/**"
        - "**/.config/resticprofile/*.key"
      exclude-caches: true
      one-file-system: false
      no-error-on-warning: true
      run-after:
        # Telegram success notification
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-success
          --tag "hc-{{ .Profile.Name }}-backup-success"
          -t "🟢 Backup Success: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: backup\nTime: $(date '+%Y-%m-%d %H:%M:%S')"
          -vv
      run-after-fail:
        # Telegram + email failure notification + HC.io fail ping
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-fail
          --tag "hc-{{ .Profile.Name }}-backup-fail"
          -t "🔴 Backup FAILED: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: backup\nTime: $(date '+%Y-%m-%d %H:%M:%S')\nError: $ERROR_MESSAGE"
          -vv

    copy:
      run-after:
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-success
          --tag "hc-{{ .Profile.Name }}-success"
          -t "🟢 Copy Success: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: copy\nTime: $(date '+%Y-%m-%d %H:%M:%S')"
          -vv
      run-after-fail:
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-fail
          --tag "hc-{{ .Profile.Name }}-fail"
          -t "🔴 Copy FAILED: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: copy\nTime: $(date '+%Y-%m-%d %H:%M:%S')\nError: $ERROR_MESSAGE"
          -vv

    forget:
      run-after:
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-success
          --tag "hc-{{ .Profile.Name }}-success"
          -t "🟢 Forget/Prune Success: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: forget\nTime: $(date '+%Y-%m-%d %H:%M:%S')"
          -vv
      run-after-fail:
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-fail
          --tag "hc-{{ .Profile.Name }}-fail"
          -t "🔴 Forget/Prune FAILED: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: forget\nTime: $(date '+%Y-%m-%d %H:%M:%S')\nError: $ERROR_MESSAGE"
          -vv

    check:
      run-after:
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-success
          -t "🟢 Check Success: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: check\nTime: $(date '+%Y-%m-%d %H:%M:%S')"
          -vv
      run-after-fail:
        - >-
          apprise -e
          -c "{{ .Env.HOME }}/.config/resticprofile/apprise.yaml"
          --tag backup-fail
          -t "🔴 Check FAILED: {{ .Profile.Name }}"
          -b "Host: $(hostname -s)\nProfile: {{ .Profile.Name }}\nOperation: check\nTime: $(date '+%Y-%m-%d %H:%M:%S')\nError: $ERROR_MESSAGE"
          -vv

  # --- Local repository (hub for all backups) ---
  local:
    inherit: base
    repository: "local:{{ .Env.HOME }}/Backups/restic/main"
    lock: "/tmp/resticprofile-local.lock"
    run-before:
      - "mkdir -p {{ .Env.HOME }}/Backups/restic"

  # --- B2 repository (offsite copy); needs B2_ACCOUNT_ID, B2_ACCOUNT_KEY ---
  b2:
    inherit: base
    env-file: "{{ .Env.HOME }}/.config/resticprofile/b2.env"
    repository: "b2:yoshintame:restic/main"
    lock: "/tmp/resticprofile-b2.lock"

  dev:
    inherit: local
    backup:
      source-base: "{{ .Env.HOME }}/Development"
      source:
        - "."
      tag:
        - "{{ .Profile.Name }}"
      schedule: "*:00,30"
      schedule-permission: user
      schedule-log: "{{ .Env.TMPDIR }}/resticprofile-dev.log"

  home:
    inherit: local
    backup:
      source-base: "{{ .Env.HOME }}"
      source:
        - ".ssh"
        - ".config"
        - ".dotfiles"
        - "Documents"
        - "Pictures"
        - "remnote"
        - "Backups"
        - ".gnupg"
        - ".zsh_history"
        - ".bash_history"
        - ".history.db"
        - ".local/share/fish/fish_history"
      tag:
        - home
      schedule: "2:00"
      schedule-permission: user
      schedule-log: "{{ .Env.TMPDIR }}/resticprofile-home.log"

  copy-to-b2:
    inherit: local
    env-file: "{{ .Env.HOME }}/.config/resticprofile/b2.env"
    copy:
      initialize: true
      initialize-copy-chunker-params: true
      repository: "b2:yoshintame:restic/main"
      password-file: "{{ .Env.HOME }}/.config/resticprofile/repo.key"
      schedule: "0,3,6,9,12,15,18,21:00"
      schedule-permission: user
      schedule-log: "{{ .Env.TMPDIR }}/resticprofile-copy-to-b2.log"

  maint-local:
    inherit: local
    forget:
      group-by: "host,tags"
      keep-within: 1d
      keep-daily: 14
      keep-weekly: 8
      keep-monthly: 6
      prune: true
      host: true
      tag: true
      schedule: "sun 4:00"
      schedule-permission: user
      schedule-log: "{{ .Env.TMPDIR }}/resticprofile-maint-local.log"

  maint-b2:
    inherit: b2
    forget:
      group-by: "host,tags"
      keep-daily: 30
      keep-weekly: 12
      keep-monthly: 12
      keep-yearly: 3
      prune: true
      host: true
      tag: true
      schedule: "sun 5:00"
      schedule-permission: user
      schedule-log: "{{ .Env.TMPDIR }}/resticprofile-maint-b2.log"

  check-local:
    inherit: local
    check:
      schedule: "*-*-01 6:00"
      schedule-permission: user
      schedule-log: "{{ .Env.TMPDIR }}/resticprofile-check-local.log"

  check-b2:
    inherit: b2
    check:
      read-data-subset: "5%"
      schedule: "*-*-01 7:00"
      schedule-permission: user
      schedule-log: "{{ .Env.TMPDIR }}/resticprofile-check-b2.log"
